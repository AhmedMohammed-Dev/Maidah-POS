<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background Container -->
  <rect width="512" height="512" rx="110" fill="url(#grad)"/>
  
  <!-- 
    Authentic Lucide 'UtensilsCrossed' Paths 
    Original Grid: 24x24
    Target Size: ~360px within 512px canvas
    Scale: 15x
    Translation: Centered ((512 - (24*15)) / 2) = 76
    Stroke Width: 2.5 (Bold) relative to 24px grid = 37.5px actual width
  -->
  <g transform="translate(76, 76) scale(15)" 
     fill="none" 
     stroke="white" 
     stroke-width="2.5" 
     stroke-linecap="round" 
     stroke-linejoin="round"
     filter="url(#shadow)">
    
    <!-- The exact paths from lucide-react library -->
    <path d="m3 2 20 20" />
    <path d="m21 2-20 20" />
    <path d="m3 7 5 5" />
    <path d="m7 3 5 5" />
    <path d="m16 12 5 5" />
    <path d="m12 16 5 5" />
  </g>
</svg>