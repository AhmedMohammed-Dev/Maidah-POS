
<!DOCTYPE html>
<html lang="en" dir="ltr">

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">

    <!-- Tailwind CSS (CDN for Immediate Preview) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Tajawal', 'sans-serif'],
            },
            colors: {
              primary: {
                50: '#fff7ed',
                100: '#ffedd5',
                200: '#fed7aa',
                300: '#fdba74',
                400: '#fb923c',
                500: '#f97316',
                600: '#ea580c',
                700: '#c2410c',
                800: '#9a3412',
                900: '#7c2d12',
              }
            },
            keyframes: {
              "fade-in": {
                "0%": { opacity: "0" },
                "100%": { opacity: "1" },
              },
              "fade-out": {
                "0%": { opacity: "1" },
                "100%": { opacity: "0" },
              },
              "zoom-in": {
                "0%": { opacity: "0", transform: "scale(0.95)" },
                "100%": { opacity: "1", transform: "scale(1)" },
              },
              "slide-in-from-top": {
                "0%": { transform: "translateY(-100%)" },
                "100%": { transform: "translateY(0)" },
              },
              "slide-in-from-bottom": {
                "0%": { transform: "translateY(10%)", opacity: "0" },
                "100%": { transform: "translateY(0)", opacity: "1" },
              },
              "slide-in-from-right": {
                "0%": { transform: "translateX(100%)" },
                "100%": { transform: "translateX(0)" },
              },
              "slide-in-from-left": {
                "0%": { transform: "translateX(-100%)" },
                "100%": { transform: "translateX(0)" },
              },
              "pulse-subtle": {
                "0%, 100%": { opacity: "1" },
                "50%": { opacity: "0.8" },
              }
            },
            animation: {
              "fade-in": "fade-in 0.3s ease-out",
              "fade-out": "fade-out 0.2s ease-in",
              "zoom-in": "zoom-in 0.2s ease-out",
              "slide-in-from-top": "slide-in-from-top 0.3s ease-out",
              "slide-in-from-bottom": "slide-in-from-bottom 0.4s ease-out",
              "slide-in-from-right": "slide-in-from-right 0.3s ease-out",
              "slide-in-from-left": "slide-in-from-left 0.3s ease-out",
              "pulse-subtle": "pulse-subtle 2s cubic-bezier(0.4, 0, 0.6, 1) infinite",
            },
          },
        },
        plugins: [],
      }
    </script>

    <!-- Import Map for Preview Environment -->
    <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.1",

    "path": "https://aistudiocdn.com/path@^0.12.7",
    "url": "https://aistudiocdn.com/url@^0.11.4",
    "vite": "https://aistudiocdn.com/vite@^7.2.6",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1",
    "electron-updater": "https://aistudiocdn.com/electron-updater@^6.6.2"
  }
}
</script>
  </head>
  <!-- IMPORTANT: body has overflow-hidden to act like an app, BUT inner containers must scroll -->
  <body class="bg-slate-50 text-slate-900 font-sans antialiased overflow-hidden selection:bg-primary-500 selection:text-white">
    <div id="root">
        <!-- Native Loading Spinner -->
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #f8fafc; font-family: sans-serif;">
            <div style="width: 50px; height: 50px; border: 4px solid #e2e8f0; border-top-color: #f97316; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <h2 style="margin-top: 20px; font-weight: 800; color: #1e293b;">Loading System...</h2>
            <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
        </div>
    </div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
